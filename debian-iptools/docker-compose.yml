services:
  # Primary interactive toolbox
  iptoolkit:
    container_name: iptoolkit
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: "${HTTP_PROXY:-}"
        HTTPS_PROXY: "${HTTPS_PROXY:-}"
    image: "${IMAGE_NAME:-iptools}:${IMAGE_TAG:-debian-slim}"
    hostname: "${HOSTNAME_OVERRIDE:-iptoolkit}"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      TZ: "${TZ:-UTC}"
      TERM: xterm-256color
      START_SSH: "true"
      SSH_PORT: "${SSH_PORT:-2222}"
      SSH_USER: "${SSH_USER:-root}"
      SSH_PASSWORD: "${SSH_PASSWORD:-iptools}"
    volumes:
      - vnstat-db:/var/lib/vnstat
      - ./work:/work
    ports:
      - "${SSH_PORT:-2222}:${SSH_PORT:-2222}"
      - "${IPERF_PORT:-5201}:${IPERF_PORT:-5201}"
    healthcheck:
      test: ["CMD-SHELL", "ping -c1 8.8.8.8 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    stdin_open: true
    tty: true
    restart: unless-stopped
    profiles: ["default"]

  # Background iperf3 server
  iperf3-server:
    container_name: iperf3-server
    image: "${IMAGE_NAME:-iptools}:${IMAGE_TAG:-debian-slim}"
    cap_add:
      - NET_ADMIN
    environment:
      START_SSH: "false"
      SSH_PORT: "${SSH_PORT:-2222}"
      SSH_USER: "${SSH_USER:-root}"
      SSH_PASSWORD: "${SSH_PASSWORD:-iptools}"
    command: ["iperf3", "-s", "-p", "${IPERF_PORT:-5201}"]
    ports:
      - "${IPERF_PORT:-5201}:${IPERF_PORT:-5201}"
    restart: unless-stopped
    profiles: ["perf"]

  # Continuous background capture
  tshark-capture:
    container_name: tshark-capture
    image: "${IMAGE_NAME:-iptools}:${IMAGE_TAG:-debian-slim}"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      START_SSH: "false"
      SSH_PORT: "${SSH_PORT:-2222}"
      SSH_USER: "${SSH_USER:-root}"
      SSH_PASSWORD: "${SSH_PASSWORD:-iptools}"
    command:
      [
        "tshark",
        "-i", "${CAP_IFACE:-any}",
        "-b", "files:10",
        "-b", "filesize:100000",
        "-w", "/captures/cap.pcap"
      ]
    volumes:
      - ./captures:/captures
    restart: unless-stopped
    profiles: ["capture"]

volumes:
  vnstat-db:
